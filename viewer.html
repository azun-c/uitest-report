<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --radius: 6px;
      --toolbar-h: 44px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Toolbar ─────────────────────────────────────── */
    .toolbar {
      height: var(--toolbar-h);
      min-height: var(--toolbar-h);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .toolbar a.back {
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .toolbar a.back:hover { text-decoration: underline; }

    .toolbar .sep {
      color: var(--border);
    }

    #report-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .toolbar button {
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .toolbar button:hover { background: var(--bg); }

    /* ── Iframe ──────────────────────────────────────── */
    #frame {
      flex: 1;
      border: none;
      width: 100%;
    }

    /* ── States ──────────────────────────────────────── */
    #status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    #status.error { color: #a40000; }

    /* ── Modal overlay ───────────────────────────────── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #modal.open { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      width: min(420px, calc(100vw - 2rem));
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }
    .modal-box h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .modal-box p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .modal-box label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }
    .modal-box input {
      width: 100%;
      padding: 0.45rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: monospace;
      margin-bottom: 1rem;
      outline: none;
    }
    .modal-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,105,218,0.15); }
    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .modal-actions button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .modal-actions button.primary:hover { background: #0550ae; }
    .modal-actions button:not(.primary):hover { background: var(--bg); }
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="back" href="/">← Reports</a>
    <span class="sep">|</span>
    <span id="report-title">Loading…</span>
    <button id="btn-key" title="Set Groq API key">🔑 API Key</button>
  </div>

  <div id="status">Loading report…</div>
  <iframe id="frame" style="display:none"></iframe>

  <!-- API key modal -->
  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <h2 id="modal-title">🔑 Groq API Key</h2>
      <p>
        Reports use a placeholder <code>YOUR_GROQ_API_KEY</code> in the repo.
        Enter your real key to enable live features when viewing the report.<br><br>
        The key is stored only in <strong>your browser's localStorage</strong> and is never sent to any server.
      </p>
      <label for="key-input">API Key</label>
      <input id="key-input" type="password" placeholder="gsk_…" autocomplete="off" spellcheck="false" />
      <div class="modal-actions">
        <button id="btn-cancel">Cancel</button>
        <button id="btn-save" class="primary">Save &amp; View</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    const STORAGE_KEY = 'groq_api_key';
    const PLACEHOLDER = 'YOUR_GROQ_API_KEY';

    const params   = new URLSearchParams(location.search);
    const fileUrl  = params.get('file');
    const title    = params.get('name') || fileUrl || 'Report';

    const elStatus = document.getElementById('status');
    const elFrame  = document.getElementById('frame');
    const elTitle  = document.getElementById('report-title');
    const elModal  = document.getElementById('modal');
    const elInput  = document.getElementById('key-input');

    elTitle.textContent = decodeURIComponent(title);
    document.title = decodeURIComponent(title);

    let blobUrl = null;

    /* ── Load & inject ─────────────────────────────── */
    async function loadReport(apiKey) {
      if (!fileUrl) {
        showError('No report file specified.');
        return;
      }
      elStatus.textContent = 'Loading report…';
      elStatus.className   = '';
      elStatus.style.display = 'flex';
      elFrame.style.display  = 'none';

      try {
        const res = await fetch(fileUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        let html = await res.text();

        if (apiKey) {
          html = html.replaceAll(PLACEHOLDER, apiKey);
        }

        // Revoke previous blob to avoid memory leak
        if (blobUrl) URL.revokeObjectURL(blobUrl);
        blobUrl = URL.createObjectURL(new Blob([html], { type: 'text/html' }));

        elFrame.src = blobUrl;
        elFrame.onload = () => {
          elStatus.style.display = 'none';
          elFrame.style.display  = 'block';
        };
      } catch (err) {
        showError(`Failed to load report: ${err.message}`);
      }
    }

    function showError(msg) {
      elStatus.textContent  = '⚠ ' + msg;
      elStatus.className    = 'error';
      elStatus.style.display = 'flex';
      elFrame.style.display  = 'none';
    }

    /* ── Modal ─────────────────────────────────────── */
    function openModal() {
      elInput.value = localStorage.getItem(STORAGE_KEY) || '';
      elModal.classList.add('open');
      elInput.focus();
    }
    function closeModal() {
      elModal.classList.remove('open');
    }

    document.getElementById('btn-key').addEventListener('click', openModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);

    document.getElementById('btn-save').addEventListener('click', () => {
      const key = elInput.value.trim();
      if (key) localStorage.setItem(STORAGE_KEY, key);
      else localStorage.removeItem(STORAGE_KEY);
      closeModal();
      loadReport(key || null);
    });

    // Close modal on backdrop click
    elModal.addEventListener('click', e => { if (e.target === elModal) closeModal(); });
    // Close on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    /* ── Bootstrap ─────────────────────────────────── */
    loadReport(localStorage.getItem(STORAGE_KEY));
  </script>
</body>
</html>
