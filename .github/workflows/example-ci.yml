# Example: how to publish a report from YOUR CI repository.
#
# Copy/adapt this workflow into your project's .github/workflows/ directory.
# It generates a test report, then pushes it to this reports repository.
#
# Prerequisites:
#   1. Create a GitHub Personal Access Token (PAT) with `repo` scope
#      (or a fine-grained token with Contents: Read & Write for this repo).
#   2. Add the token as a secret named REPORTS_PUSH_TOKEN in your project repo.
#      Settings → Secrets and variables → Actions → New repository secret
#
name: CI — Publish Report (example)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      # ── Replace this step with your real test command ──────────────────────
      - name: Run tests & generate report
        run: |
          echo "Running tests…"
          # Examples:
          #   pytest --html=test-report.html --self-contained-html
          #   npx playwright test --reporter=html --output=test-report
          #   gradle test  (output: build/reports/tests/test/index.html)

          # Minimal stand-in — remove in your real workflow:
          cat > test-report.html <<'EOF'
          <!DOCTYPE html><html><head><title>Report #${{ github.run_number }}</title></head>
          <body><h1>Build #${{ github.run_number }}</h1>
          <p>Commit: ${{ github.sha }}</p><p>All tests passed ✓</p></body></html>
          EOF
      # ───────────────────────────────────────────────────────────────────────

      - name: Publish report to reports site
        # Only publish on pushes to main, not on PRs (adjust as needed)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.REPORTS_PUSH_TOKEN }}
          # Change REPORTS_REPO to owner/repo of your uitest-report repository
          REPORTS_REPO: ${{ github.repository_owner }}/uitest-report
        run: |
          # Clone the reports site
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPORTS_REPO}.git" _reports_site
          cd _reports_site

          # Publish the report
          GIT_USER_NAME="${{ github.actor }}" \
          GIT_USER_EMAIL="${{ github.actor }}@users.noreply.github.com" \
          bash scripts/add-report.sh \
            "../test-report.html" \
            "Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}"
