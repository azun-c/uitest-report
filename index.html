<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI Reports</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --date-bg: #f6f8fa;
      --date-border: #d0d7de;
      --shadow: 0 1px 3px rgba(31,35,40,0.12);
      --radius: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────── */
    .app {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      margin-bottom: 1.75rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }
    #summary {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* ── Date group card ─────────────────────────────── */
    .date-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .date-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      background: var(--date-bg);
      border-bottom: 1px solid var(--date-border);
    }
    .date-header .date-label {
      font-size: 0.875rem;
      font-weight: 600;
    }
    .date-header .count {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── Report list ─────────────────────────────────── */
    .report-list { list-style: none; }

    .report-item:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .report-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.65rem 1rem;
      color: var(--accent);
      text-decoration: none;
      transition: background 0.1s;
    }
    .report-link:hover {
      background: #f6f8fa;
    }
    .report-link:hover .report-name {
      text-decoration: underline;
    }

    .report-name {
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .report-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .report-time {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .report-arrow {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ── Pagination ──────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    .pagination button {
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--accent);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      min-width: 2rem;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .pagination button:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .pagination button:disabled {
      color: var(--text-muted);
      cursor: default;
      opacity: 0.55;
    }
    .pagination button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    .pagination .ellipsis {
      padding: 0 0.25rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1.8rem;
    }

    /* ── States ──────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }
    .empty-state h2 {
      font-size: 1.125rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .empty-state code {
      font-size: 0.8rem;
      background: #f6f8fa;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
    }

    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .error-box {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      color: #a40000;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>📋 CI Reports</h1>
      <span id="summary"></span>
    </header>
    <main id="content">
      <div class="loading">Loading reports…</div>
    </main>
    <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
  </div>

  <script>
    'use strict';

    const GROUPS_PER_PAGE = 10;

    let allGroups = [];   // [[dateStr, reports[]], ...]  sorted newest-first
    let currentPage = 1;

    /* ── Helpers ──────────────────────────────────────── */

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function formatTime(ts) {
      try {
        return new Date(ts).toLocaleTimeString('en-US', {
          hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
        });
      } catch {
        return ts;
      }
    }

    /* ── Data ─────────────────────────────────────────── */

    function groupByDate(reports) {
      const map = new Map();
      for (const r of reports) {
        const key = r.date || r.timestamp?.slice(0, 10) || 'unknown';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(r);
      }
      for (const list of map.values()) {
        list.sort((a, b) => (b.timestamp ?? '').localeCompare(a.timestamp ?? ''));
      }
      return [...map.entries()].sort(([a], [b]) => b.localeCompare(a));
    }

    /* ── Render ───────────────────────────────────────── */

    function renderContent() {
      const content = document.getElementById('content');

      if (allGroups.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <h2>No reports yet</h2>
            <p>Reports will appear here once your CI pipeline starts publishing them.<br>
              Use <code>scripts/add-report.sh</code> to add a report.</p>
          </div>`;
        return;
      }

      const start = (currentPage - 1) * GROUPS_PER_PAGE;
      const pageGroups = allGroups.slice(start, start + GROUPS_PER_PAGE);

      content.innerHTML = pageGroups.map(([date, reports]) => `
        <section class="date-group">
          <div class="date-header">
            <span class="date-label">${esc(formatDate(date))}</span>
            <span class="count">${reports.length} report${reports.length !== 1 ? 's' : ''}</span>
          </div>
          <ul class="report-list" role="list">
            ${reports.map(r => `
              <li class="report-item">
                <a href="${esc(r.file)}" target="_blank" rel="noopener noreferrer" class="report-link">
                  <span class="report-name" title="${esc(r.name)}">${esc(r.name)}</span>
                  <span class="report-meta">
                    <span class="report-time">${esc(formatTime(r.timestamp))}</span>
                    <span class="report-arrow" aria-hidden="true">↗</span>
                  </span>
                </a>
              </li>`).join('')}
          </ul>
        </section>`).join('');
    }

    function renderPagination() {
      const nav = document.getElementById('pagination');
      const totalPages = Math.ceil(allGroups.length / GROUPS_PER_PAGE);

      if (totalPages <= 1) { nav.innerHTML = ''; return; }

      // Build page number array with ellipses
      const pages = [];
      if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
      } else {
        pages.push(1);
        const lo = Math.max(2, currentPage - 2);
        const hi = Math.min(totalPages - 1, currentPage + 2);
        if (lo > 2) pages.push('…');
        for (let i = lo; i <= hi; i++) pages.push(i);
        if (hi < totalPages - 1) pages.push('…');
        pages.push(totalPages);
      }

      nav.innerHTML = `
        <button onclick="goTo(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} aria-label="Previous page">← Prev</button>
        ${pages.map(p =>
          p === '…'
            ? `<span class="ellipsis">…</span>`
            : `<button class="${p === currentPage ? 'active' : ''}" onclick="goTo(${p})" aria-label="Page ${p}" aria-current="${p === currentPage ? 'page' : 'false'}">${p}</button>`
        ).join('')}
        <button onclick="goTo(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} aria-label="Next page">Next →</button>`;
    }

    /* ── Navigation ───────────────────────────────────── */

    function goTo(page) {
      const totalPages = Math.ceil(allGroups.length / GROUPS_PER_PAGE);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderContent();
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ── Bootstrap ────────────────────────────────────── */

    async function init() {
      try {
        const res = await fetch('reports.json');
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        const reports = await res.json();

        allGroups = groupByDate(reports);
        currentPage = 1;

        const total = reports.length;
        document.getElementById('summary').textContent =
          total === 0
            ? 'No reports yet.'
            : `${total} report${total !== 1 ? 's' : ''} across ${allGroups.length} day${allGroups.length !== 1 ? 's' : ''}`;

        renderContent();
        renderPagination();
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="error-box">⚠ Failed to load reports: ${esc(err.message)}</div>`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
